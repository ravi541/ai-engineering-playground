<!DOCTYPE html>
<html>

<head>
    <title>Employee Salary Prediction</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
            text-align:center;
            margin-top:80px;
        }

        input{
            padding:10px;
            width:250px;
            font-size:18px;
        }

        button{
            padding:10px 20px;
            font-size:18px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        h1{
            color:#333;
        }

    </style>

</head>

<body>

<h1>Employee Salary Prediction</h1>

<form action="/predict" method="POST">

<input
type="number"
step="0.1"
name="level"
placeholder="Enter Position Level"
required>

<br><br>

<button type="submit">

Predict Salary

</button>

</form>

<h2>

{{ prediction_text }}

</h2>

</body>

</html>
